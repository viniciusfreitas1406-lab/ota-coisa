<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para Minha Esposa ❤️</title>

<style>

body{
margin:0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff5f9e,#ffc1d6);
text-align:center;
color:white;
overflow-x:hidden;
}

.container{
margin-top:60px;
}

img{
width:320px;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.caixa{
margin:40px auto;
width:260px;
padding:20px;
background:white;
color:#ff4f8b;
border-radius:20px;
font-size:20px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

.caixa:hover{
transform:scale(1.05);
}

#mensagem{
display:none;
font-size:24px;
max-width:700px;
margin:30px auto;
line-height:1.6;
}

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}

</style>
</head>

<body>

<div class="container">

<h1>❤️ Para Minha Esposa ❤️</h1>

<img src="C:/Users/vinic/OneDrive/Ambiente de Trabalho/Casamento CSC/WhatsApp Image 2026-03-08 at 11.44.12.jpeg">

<div class="caixa" onclick="abrirMensagem()">
💌 Clique aqui
</div>

<div id="mensagem">

FELIZ DIA DA MINHA MULHER<br><br>

Sou grato por todos os dias se esforçar para ser uma esposa melhor.<br><br>

Espero conseguir deixar seus dias mais tranquilos, e ser um bom marido pra você.<br><br>

TE AMO!!! ❤️

</div>

</div>

<audio id="musica">
<source src="C:/Users/vinic/OneDrive/Ambiente de Trabalho/Casamento CSC/WhatsApp Audio 2026-03-08 at 11.57.30.mp4" type="audio/mp4">
</audio>

<script>

function abrirMensagem(){

document.getElementById("mensagem").style.display="block"
document.getElementById("musica").play()

}

function criarCoracao(){

const heart = document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

heart.style.animationDuration=Math.random()*3+3+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(criarCoracao,300)

</script>

</body>
</html>
